body: |-
  Contract: conformance scaffold operations shall discover profile obligations, compute missing feature and test rows, report dry-run plans, apply requested rows through SSOT APIs, preserve reciprocal links, and remain idempotent. Claim and evidence creation shall be explicit opt-in. Conformance evidence output shall be machine-readable and suitable for later registry sync-statuses and validation.
