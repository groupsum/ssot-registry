body: |-
  ## Scope
  
  This specification defines the repo-local SSOT state for registered external ADR and SPEC catalogs.
  
  ## Required Catalog Fields
  
  Each registered extension-pack catalog SHALL carry:
  - a stable catalog_id
  - publisher identity
  - origin type
  - distribution channel and package identity
  - trust state
  - desired version or pin policy
  - owned ADR/SPEC reservation ranges
  - references to the packaged catalog metadata used for ingest
  
  ## Rules
  
  - Repo-local catalog state SHALL be authoritative for operator intent.
  - Catalog metadata SHALL be inspectable without resolving package artifacts.
  - Package-self-describing ingest metadata SHALL be imported rather than redundantly re-entered through CLI flags.
  - Catalog-owned reservations SHALL be stored as governed repo-local state.
