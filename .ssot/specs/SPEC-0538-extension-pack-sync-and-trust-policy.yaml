body: |-
  ## Scope
  
  This is an `ssot-core` maintainer specification for the upstream `ssot-registry`
  repository.
  
  This phase governs downstream sync and validation rules for packaged
  `extension-pack` ADR/SPEC catalogs only.
  
  ## Trust Policy
  
  - Downstream sync of `extension-pack` catalogs SHALL be opt-in.
  - Untrusted extension-pack catalogs SHALL fail closed during packaged document sync.
  - Trusted built-in `ssot-origin` catalogs remain allowed by default.
  - External governance packs SHALL pass metadata validation before a repository may mark them trusted.
  - Trust policy SHALL be applied after package metadata, package manifest, document manifest, file existence, and hash checks pass.
  
  ## Sync Rules
  
  When trust policy allows an extension-pack catalog:
  
  - packaged ADR/SPEC rows SHALL sync into downstream repositories as managed and immutable
  - synced rows SHALL preserve their `origin: extension-pack`
  - synced rows SHALL preserve catalog-owned numbering and target paths
  - downstream local edits to synced packaged docs SHALL be treated as drift and SHALL be overwritten by sync
  
  ## Conflict Handling
  
  Conflicts across trusted packaged catalogs SHALL fail closed unless explicitly
  resolved by policy.
  
  At minimum, the sync process SHALL reject:
  
  - duplicate document ids across catalogs
  - duplicate reserved numbers across catalogs
  - duplicate target paths across catalogs
  - packaged manifest entries whose declared origin does not match the catalog authority
  - packaged manifest entries whose reservation owner does not match the pack metadata
  - packaged document files whose SHA-256 digest does not match the manifest row
  
  ## Deferred Surfaces
  
  This specification does not yet define:
  
  - operator-facing config UX for catalog allowlisting
  - extension-pack support for features, tests, claims, evidence, issues, risks, boundaries, or releases
  - conformance-template ownership outside `ssot-origin`
