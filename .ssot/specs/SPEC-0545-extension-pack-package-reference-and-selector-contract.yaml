body: |-
  ## Scope
  
  This specification defines how the pack CLI resolves package references, catalog selectors, and pack-scoped document references.
  
  ## Package Reference Rules
  
  - ssot pack add SHALL accept a package reference as the normal operator input.
  - A package reference MAY include a pinned version.
  - The package reference SHALL be sufficient to locate package-self-describing ingest metadata.
  - Package references SHALL resolve to governance-pack metadata through `load_pack_metadata()` and document inventory through `load_pack_manifest()` before repo-local registration is mutated.
  - A package that cannot expose the governance-pack root API SHALL fail preflight before trust, reservation, or sync policy is evaluated.
  
  ## Pack-Scoped Document Reference Rules
  
  External references to governance-pack documents SHALL use a structured tuple rather than a bare local document id:
  
  ```json
  {
    pack_id: pack:example-governance-pack,
    kind: spec,
    id: spc:0001
  }
  ```
  
  The tuple fields mean:
  - `pack_id`: the normalized pack id from governance-pack metadata.
  - `kind`: the document family, currently `adr` or `spec`.
  - `id`: the pack-local ADR or SPEC id declared by that pack's manifest.
  
  Tooling MAY expose a compact selector syntax for operators, but persisted registry state and machine-readable outputs SHALL retain the structured tuple or a materialized local id with equivalent provenance.
  
  ## Selector Rules
  
  - Catalog-oriented pack subcommands SHALL accept a catalog selector rather than duplicated identity flags.
  - A selector MAY resolve by catalog id, package reference, pack id, package name, or another normalized catalog alias defined by repo-local state.
  - A selector that resolves to multiple packs SHALL fail closed unless the operator supplies an explicit disambiguator.
  
  ## CLI Minimality
  
  - Operators SHALL NOT be required to supply publisher, origin type, reservation ranges, or catalog id if those fields are present in the package metadata.
  - Override flags are reserved for trust and execution policy, not identity restatement.
  - CLI output that reports ADR/SPEC links from extension packs SHOULD include both the materialized local id and the source pack-scoped document reference.
