body: |-
  ## Scope
  
  This specification defines how the pack CLI resolves package references and catalog selectors.
  
  ## Package Reference Rules
  
  - ssot pack add SHALL accept a package reference as the normal operator input.
  - A package reference MAY include a pinned version.
  - The package reference SHALL be sufficient to locate package-self-describing ingest metadata.
  - Package references SHALL resolve to governance-pack metadata through `load_pack_metadata()` and document inventory through `load_pack_manifest()` before repo-local registration is mutated.
  - A package that cannot expose the governance-pack root API SHALL fail preflight before trust, reservation, or sync policy is evaluated.
  
  ## Selector Rules
  
  - Catalog-oriented pack subcommands SHALL accept a catalog selector rather than duplicated identity flags.
  - A selector MAY resolve by catalog id, package reference, or another normalized catalog alias defined by repo-local state.
  
  ## CLI Minimality
  
  - Operators SHALL NOT be required to supply publisher, origin type, reservation ranges, or catalog id if those fields are present in the package metadata.
  - Override flags are reserved for trust and execution policy, not identity restatement.
