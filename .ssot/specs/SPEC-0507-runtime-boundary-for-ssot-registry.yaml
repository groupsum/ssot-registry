spec_kind: "governance"
body: |-
  `ssot-registry` SHALL keep:
  
  - load / save
  - validators
  - guards
  - migrations
  - entity and document mutation behavior
  - release and lifecycle behavior
  
  `ssot-registry` SHALL import contracts and views rather than owning those artifacts.
