body: |-
  ## Scope
  
  This specification defines how external catalogs are removed from downstream repositories.
  
  ## Rules
  
  - Unregister, detach, and prune SHALL be distinct operator actions.
  - Removal SHALL NOT silently delete synchronized documents.
  - Detached extension-pack rows SHALL remain auditable until explicitly pruned.
  - Prune flows SHALL be explicit and operator-confirmed.
