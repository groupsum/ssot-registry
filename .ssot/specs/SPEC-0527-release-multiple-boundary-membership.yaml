body: |-
  Contract: release entities shall continue to expose `boundary_id` for primary-boundary compatibility and shall expose `boundary_ids` for complete release scope membership in schema `0.3.0` and later. When `boundary_ids` is present and non-empty, release guards, graph exports, release snapshots, publication snapshots, and conformance checks shall use that ordered set. When `boundary_ids` is absent in older registries, consumers shall fall back to `[boundary_id]`. CLI create/update flows shall preserve the primary `boundary_id` as the first member of `boundary_ids`; add/remove boundary operations shall not allow removal of the primary boundary without an explicit release update. The `0.2.0 -> 0.3.0` migration shall seed `boundary_ids` from `boundary_id` and preserve existing extra boundary membership with the primary boundary first.
