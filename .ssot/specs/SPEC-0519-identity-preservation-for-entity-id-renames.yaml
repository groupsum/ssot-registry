body: |-
  This SPEC defines identity preservation requirements when SSOT entity IDs change.\n\nRequirements:\n- Renaming an entity id must preserve graph integrity.\n- All inbound references to the old id must be rewritten to the new id.\n- Program-level active ids must be updated when applicable.\n- Validation must pass after rename operations.
