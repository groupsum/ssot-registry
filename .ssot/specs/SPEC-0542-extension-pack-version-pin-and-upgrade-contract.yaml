body: |-
  ## Scope

  This specification defines version pinning, resolved artifact tracking, and upgrade planning for external packs.

  ## Rules

  - Repo-local state SHALL distinguish desired version policy from currently resolved artifact state.
  - Pinned catalogs SHALL validate against the declared pin.
  - Drift between desired and resolved versions SHALL be detectable.
  - Upgrade flows SHALL preserve auditability of catalog identity and document ownership.
