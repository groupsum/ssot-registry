body: |-
  Contract: ssot-registry shall include an ssot-conformance workspace package. The package shall expose reusable pytest conformance cases, a pytest plugin entry point, profile selection, repo-root configuration, and machine-readable results suitable for SSOT evidence ingestion. The package shall be portable across downstream repositories and shall not require the target implementation to be written in Python.
