  "sections": {
    "requirements": [
      "- CI SHALL build packages from `pkgs/<name>`.\n- CI SHALL fail if release workflows rely on root `uv build` or root package version metadata.\n- Package publish workflows SHALL validate package-local tags and versions before publishing.\n- Reusable workflows SHALL define the shared package CI and package publish contract."
    ]
  },
