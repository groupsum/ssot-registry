adr_ids: []
body: |-
  TUI metadata SHALL describe:

  - entity sections
  - table columns
  - form / detail sections
  - future action metadata
  
  `ssot-tui` SHALL consume generated TUI metadata where practical.
  TUI bridge actions that invoke `ssot-cli` from a source checkout SHALL include
  every workspace source root required by the current CLI dependency graph,
  including `ssot-pack-contracts`, so pack-aware CLI commands resolve the same
  package contract surface available to direct CLI invocations.
