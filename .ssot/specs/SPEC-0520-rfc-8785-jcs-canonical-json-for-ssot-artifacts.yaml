body: |-
  This specification defines JSON canonicalization rules for SSOT artifacts under `.ssot` and for JSON content accepted by insertion or generation surfaces.
  
  1. `.ssot/registry.json` SHALL be RFC 8785 JCS canonical JSON.
  2. Every `.json` file under `.ssot/` SHALL be RFC 8785 JCS canonical JSON.
  3. Canonicalization SHALL reject duplicate object keys and non-finite numbers (`NaN`, `Infinity`, `-Infinity`).
  4. Serialization SHALL produce deterministic key ordering and RFC 8785-compatible primitive rendering.
  5. Validation SHALL fail when any persisted `.ssot/*.json` file is not canonical RFC 8785 JCS JSON.
  6. ssot-core save paths that emit `.ssot/*.json` artifacts SHALL use the canonical serializer.
  7. When ssot-core accepts non-canonical but otherwise valid JSON through insertion, import, or save surfaces, it SHALL canonicalize that JSON before persistence.
  8. JSON-derived ADR, SPEC, docs, report, and entity artifact generation SHALL use the canonicalized JSON representation as the generation source form.
  
  This spec governs canonical JSON behavior, insertion normalization, and JSON-derived artifact generation. ADR/SPEC document authoring rules and non-JSON document file formats remain governed by their existing schemas and file-type constraints.
