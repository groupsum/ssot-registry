body: |-
  This specification defines JSON canonicalization rules for SSOT artifacts under `.ssot/`.
  
  1. `.ssot/registry.json` SHALL be RFC 8785 JCS canonical JSON.
  2. Every `.json` file under `.ssot/` SHALL be RFC 8785 JCS canonical JSON.
  3. Canonicalization SHALL reject duplicate object keys and non-finite numbers (`NaN`, `Infinity`, `-Infinity`).
  4. Serialization SHALL produce deterministic key ordering and RFC 8785-compatible primitive rendering.
  5. Validation SHALL fail when any `.ssot/*.json` file is not canonical RFC 8785 JCS JSON.
  6. ssot-core save paths that emit `.ssot/*.json` artifacts SHALL use the canonical serializer.
  
  This spec governs canonical JSON artifacts only. ADR/SPEC document payload authoring rules remain governed by document schemas and file-type constraints.
