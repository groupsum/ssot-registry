body: |-
  ## Context
  
  Operators need two different execution modes for SSOT secondary actions such as validation, documentation sync, projections, screenshots, reports, and related generation flows.
  
  First, operators need explicit commands they can invoke directly.
  Second, repositories may want some of those actions to occur automatically at defined trigger points such as after init, after document mutation, or after feature/test/claim/evidence changes.
  
  These are related but not identical surfaces. Explicit commands are operator-driven. Automatic behavior is policy-driven.
  
  Feature creation now also needs a policy-driven default path. The system already provides scaffold flows and repair flows, but downstream operators commonly encounter strict `feature create` before they discover those supporting flows. A configurable default that materializes proof-graph closure during `feature create` is automatic behavior in the same sense as other governed generation actions.
  
  ## Decision
  
  `ssot-registry` shall treat explicit command execution and config-driven automatic execution as separate but related surfaces.
  
  The system shall support:
  - explicit command surfaces for validation, sync, and generation workflows
  - config-driven trigger policies that cause those commands to run automatically at defined points
  - per-family and per-format selectors where supported
  - auditable outputs for automation that mutates derived artifacts
  - fail-closed behavior when automatic execution encounters invalid config or validation failures
  
  Automatic execution is configurable behavior, not a mandatory default. Repositories may choose manual-only operation, mixed operation, or automatic operation for supported actions.
  
  Automatic execution shall be policy-controlled through repo-local config, while explicit invocation shall remain available regardless of config defaults unless explicitly prohibited by future policy.
  
  Default proof-graph scaffolding during `feature create` is one of the supported automatic behaviors. Repositories may keep the built-in scaffold-first default, may restate it explicitly in repo-local config, or may override it for narrow workflows such as inventory-only feature rows.
  
  ## Consequences
  
  SSOT workflows become more ergonomic without collapsing operator control into hidden behavior. Teams can adopt automation incrementally. Command capability remains independently testable, and automation policy becomes explicit rather than implicit.
