body: |-
  `ssot-contracts` is the only package that owns packaged JSON schema files.
  
  `ssot-core` consumes schema text through the `ssot_contracts` API and MUST NOT ship or maintain its own duplicate schema JSON tree.
  
  This keeps schema authority in one package, avoids silent drift between package copies, and makes changes to schema logic flow through the contracts layer first.
  
  Repo-local `.ssot/schemas` copies remain acceptable as derived repository artifacts, but they are not the package-owned master copy.
