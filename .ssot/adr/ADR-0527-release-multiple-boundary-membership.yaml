body: |-
  Decision: release records shall support multiple frozen boundaries in one release while retaining `boundary_id` as the primary compatibility field. New release rows may also carry `boundary_ids`, and release certification, promotion, publication, graph export, snapshots, CLI operations, and conformance checks shall evaluate the union of all listed release boundaries. Every listed boundary remains independently governed and must satisfy the frozen-boundary release guard.
