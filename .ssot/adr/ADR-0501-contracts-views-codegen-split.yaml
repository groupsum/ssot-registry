  "summary": "Contracts, views, and codegen split",
  "supersedes": [],
  "superseded_by": [],
  "status_notes": [],
  "references": [],
  "sections": {
    "decision": [
      "- `ssot-contracts` owns canonical schemas, manifests, packaged templates, and generated contract metadata.\n- `ssot-views` owns derived projections and report / graph builders.\n- `ssot-codegen` generates derived Python artifacts from contracts and views.\n- `ssot-registry` remains the runtime behavior engine."
    ],
    "consequences": [
      "- Static definitions move out of the runtime package.\n- UI and future npm consumers can share generated metadata."
    ]
  }
}
