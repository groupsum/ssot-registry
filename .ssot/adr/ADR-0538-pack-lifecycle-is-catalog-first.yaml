body: |-
  ## Decision

  External pack lifecycle operations SHALL be modeled at the catalog level.

  ## Rules

  - Install, trust, pin, validate, sync, upgrade, and remove actions SHALL target a catalog identity rather than individual ADR or SPEC rows.
  - ADR and SPEC sync remains the materialization step, but catalog state governs whether and how that sync is allowed.
  - CLI and API surfaces SHALL present external-pack lifecycle as catalog-first operations.

  ## Consequences

  - Operators can reason about one pack as a governed unit.
  - Trust, versioning, and conflict policy stay aligned across all documents shipped by that pack.
