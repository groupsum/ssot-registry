body: |-
  Decision: ssot-tui registry loads must run in background worker execution rather than directly in UI event handlers. Rationale: resolving, reading, indexing, and validating a registry can block the event loop and create intermittent freezes in the operator view. Consequences: the previous workspace remains visible while a new load is pending; status surfaces report the pending load; newer load requests supersede older results; load failures report errors without clearing an existing workspace.
