body: |-
  ## Context
  
  Lightweight file/folder leasing is sufficient for default local protection, but more advanced workflows benefit from durable coordination: lease heartbeats, TTL expiry, recovery after missed events, concurrent readers, and append-only audit/event history.
  
  A repository-local mechanism is preferred over introducing a separate coordination service.
  
  ## Decision
  
  `ssot-registry` shall support optional lease coordination through a SQLite registry running in WAL mode.
  
  When enabled, the SQLite coordinator shall:
  - store active lease state and append-only lease events
  - support acquisition, renewal, release, expiry, and conflict checks
  - serialize lease mutation through transactions while permitting many readers
  - provide enough event ordering for peers to detect missed updates and recover state
  - remain optional, with fallback to the lightweight default lock path when not configured
  
  SQLite-WAL coordination is a coordination substrate, not the default requirement for all repositories.
  
  ## Consequences
  
  Repositories that need stronger local coordination can opt into a durable evented lease model without depending on a remote coordinator. Simpler repositories can remain on the lightweight path.
