body: |-
  ## Context
  
  The broader file and folder lease decision tracks general workspace coordination. The registry JSON file lock boundary is narrower: it only protects `.ssot/registry.json` mutation from concurrent local writers.
  
  ## Decision
  
  `ssot-registry` shall serialize `.ssot/registry.json` mutations by default using a local sidecar lock beside the registry file.
  
  The registry lock decision shall not certify general file locks, folder locks, SQLite lease coordination, manual lease CLI workflows, or broader workspace locking.
  
  ## Consequences
  
  Registry mutation APIs get default local coordination without expanding the boundary to unrelated files or folders. Broader locking remains governed by separate lock features and boundaries.
