body: |-
  ## Context
  
  Multiple local processes, tools, or agents may attempt to mutate `.ssot/registry.json`, document trees, generated outputs, reports, graphs, or future implementation-space files at the same time.
  
  Registry mutation safety cannot depend on all callers behaving perfectly. A default coordination model is needed before broader collaborative or implementation-space mapping is introduced.
  
  ## Decision
  
  `ssot-registry` shall support lease-based locking for files and folders.
  
  The lease model shall:
  - support file-level and folder-level leases
  - deny overlapping parent/child leases that would create ambiguous ownership
  - protect `.ssot/registry.json` by default during registry mutation flows
  - record lease identity sufficient for conflict detection, release, rejection, expiry, and diagnostics
  - support expiry-based recovery from abandoned leases
  - provide extension points for quarantined paths or folders
  
  A lightweight default lock path shall exist even when no optional database-backed coordinator is configured.
  
  ## Consequences
  
  The repository gets a default mutation safety model that works in the common case without requiring external infrastructure. The same semantics can later support broader workspace coordination, quarantine handling, and implementation-space ownership.
