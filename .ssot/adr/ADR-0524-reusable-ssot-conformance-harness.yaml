body: |-
  Decision: ssot-registry shall provide a reusable SSOT conformance harness. The harness packages portable pytest-based conformance cases, profile discovery, scaffold planning, and evidence output so downstream repositories can validate conformance to ssot-core and ssot-origin obligations without embedding repo-specific implementation language assumptions. The harness must preserve SSOT ownership rules: SPECs own typed ADR links, features own spec_ids, tests own feature_ids, and status convergence remains a separate registry sync-statuses step.
