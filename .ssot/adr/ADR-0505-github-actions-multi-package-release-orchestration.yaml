  "decision_date": null,
  "tags": [],
  "summary": "GitHub Actions SHALL use one central release orchestrator workflow plus normalized package publish workflows.",
  "supersedes": [],
  "superseded_by": [],
  "status_notes": [],
  "references": [],
  "sections": {
    "decision": [
      "GitHub Actions SHALL use one central release orchestrator workflow plus normalized package publish workflows.\n\n- `release.yml` validates release policy and drives package publication in canonical order.\n- `publish-ssot-*.yml` workflows own package-local tag, build, release, and PyPI publish behavior.\n- Reusable workflows SHALL hold the shared package CI and publish logic."
    ],
    "consequences": [
      "- Release logic is package-aware rather than root-package-aware.\n- Per-package workflows remain manually callable without diverging from the orchestrated path."
    ]
  }
}
