body: |-
  ## Context
  
  SSOT repositories need durable local policy for command defaults, automation triggers, output preferences, sync behavior, and optional coordination settings. Those defaults must be visible in the repository, versionable in source control, and editable without patching CLI code or relying on hidden global state.
  
  `.ssot/registry.json` is canonical registry truth. It must not become an overloaded store for operator policy. Policy and truth must remain separate so registry semantics stay stable and automation settings stay explicit.
  
  Feature creation now has a policy-sensitive default: proof-graph scaffolding should happen implicitly for new feature rows unless the repository or the operator explicitly disables it for a specific use case such as inventory-only umbrella parents.
  
  ## Decision
  
  `ssot-registry` shall support one repo-local TOML configuration file as the authoritative policy surface for repository-local SSOT behavior.
  
  The config file:
  - shall be non-canonical policy, not canonical SSOT truth
  - shall be created idempotently by init and config bootstrap flows
  - shall be validated before any command relies on it
  - shall support explicit command defaults, automation defaults, output defaults, and optional coordination settings
  - shall not overwrite an existing file unless the operator explicitly requests replacement
  
  The config surface shall be allowed to carry feature-creation defaults, including command-scoped policy for proof-graph scaffolding. At minimum, repositories may define a default equivalent to `feature create --auto-scaffold-proof-graph`, and may also define narrower overrides for inventory-only or operator-specific workflows.
  
  Precedence shall be:
  1. explicit CLI inputs
  2. command-scoped config values
  3. global config values
  4. built-in defaults
  
  Non-interactive commands shall use resolved effective config without prompting. Interactive config authoring shall require an explicit operator action.
  
  ## Consequences
  
  Repositories gain a durable, reviewable policy surface for SSOT behavior. CLI commands can share one configuration source while `.ssot/registry.json` remains the canonical registry. Validation and automation decisions become inspectable and testable, including the default scaffold behavior for new feature creation.
