    "decision": [
      "All publishable packages SHALL live under `pkgs/`.\n\nInitial package set:\n\n- `ssot-registry`\n- `ssot-contracts`\n- `ssot-views`\n- `ssot-codegen`\n- `ssot-cli`\n- `ssot-tui`\n\nDeferred package:\n\n- `ssot-registry-npm`"
