title: "Self-describing extension packages are authoritative for pack registration"
status: "draft"
origin: "ssot-core"
decision_date: null
tags: []
summary: "A self-describing external package SHALL be the authoritative source of extension-pack ingest metadata."
supersedes: []
superseded_by: []
status_notes: []
references: []
body: |-
  ## Decision
  
  A self-describing external package SHALL be the authoritative source of extension-pack ingest metadata.
  
  ## Rules
  
  - Operators SHALL provide a package reference, not restate catalog metadata already carried by the package.
  - ssot pack add SHALL derive catalog identity, publisher identity, origin type, reservations, and manifest metadata from the packaged catalog description.
  - Package self-description SHALL be implemented through the shared `ssot-pack-contracts` metadata schema and required governance-pack Python APIs.
  - External governance packs SHALL expose `load_pack_metadata`, `load_pack_manifest`, `load_document_manifest`, `read_packaged_document_bytes`, and `read_packaged_document_text` at package root.
  - External governance pack SSOT package names SHALL be resolved from the packaged metadata file, while PyPI distribution package names and versions SHALL be resolved from installed distribution metadata.
  - CLI flags SHALL be limited to operator intent overrides such as trust, pinning, sync behavior, or forceful conflict handling.
  - Package registration and package resolution remain separate, but the package artifact remains authoritative for ingest metadata.
  
  ## Consequences
  
  - Normal extension-pack registration stays concise.
  - Operator-entered flags are reserved for policy choices rather than duplicated identity data.
