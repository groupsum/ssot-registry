body: |-
  ## Context
  
  `.ssot/registry.json` is the canonical machine-readable SSOT source. The repository also writes and stores additional JSON artifacts under `.ssot/` (schemas, reports, snapshots, exports, and evidence bundles).
  
  Existing JSON output is stable but not guaranteed to follow RFC 8785 JSON Canonicalization Scheme (JCS), which leaves canonical byte representation and cross-runtime hashing behavior underspecified.
  
  Downstream insertion paths may also receive JSON payloads that are semantically valid but not already in canonical byte form. Failing closed on persisted non-canonical content remains correct, but operators should not have to hand-canonicalize otherwise valid JSON before every insert or generation path.
  
  ## Decision
  
  ssot-core adopts RFC 8785 JSON Canonicalization Scheme (JCS) as the canonical JSON format for SSOT JSON artifacts.
  
  - `.ssot/registry.json` SHALL be serialized as RFC 8785 JCS canonical JSON.
  - JSON files under `.ssot/` SHALL be serialized as RFC 8785 JCS canonical JSON.
  - Validation SHALL fail when any persisted `.ssot/*.json` content is not canonical RFC 8785 JCS JSON.
  - When ssot-core accepts non-canonical but otherwise valid JSON through insertion, import, or save surfaces, it SHALL canonicalize that JSON before persistence.
  - JSON-derived ADR/SPEC/docs/reports/entity artifact generation SHALL use the canonicalized representation as its source form rather than preserving non-canonical input byte layout.
  
  ADR and SPEC authored documents remain YAML/JSON document payloads governed by existing document rules; this decision governs JSON canonicalization, insertion normalization, and JSON-derived artifact generation rather than imposing YAML byte-canonicalization.
  
  ## Consequences
  
  JSON writes in ssot-core must use a single canonical serializer.
  
  Insertion and import paths that persist JSON must canonicalize accepted content before writing it to disk or using it as the source for generated JSON-derived artifacts.
  
  Validation gains deterministic checks for JCS canonical formatting and duplicate-key/non-finite-number rejection in persisted `.ssot/*.json`.
  
  Hashes and diffs across platforms become deterministic for canonical JSON artifacts under `.ssot` and for generated artifacts sourced from canonicalized JSON content.
