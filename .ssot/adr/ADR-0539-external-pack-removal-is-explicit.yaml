body: |-
  ## Decision

  Removing an external pack SHALL be an explicit governed action.

  ## Rules

  - Catalog unregister, detach, and prune semantics SHALL be distinguished.
  - Removal SHALL NOT silently destroy synced documents as a side effect of losing package resolution.
  - Downstream operators SHALL make an explicit choice when removing synchronized extension-pack documents.

  ## Consequences

  - Pack removal becomes auditable.
  - Repositories avoid accidental loss of governed document surfaces.
