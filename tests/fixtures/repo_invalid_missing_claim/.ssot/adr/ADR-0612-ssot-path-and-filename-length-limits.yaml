  "slug": "ssot-path-and-filename-length-limits",
  "title": "Enforce max path and filename lengths under `.ssot`",
  "status": "draft",
  "origin": "ssot-origin",
  "decision_date": null,
  "tags": [],
  "summary": "Files under `.ssot` MUST respect these limits:",
  "supersedes": [],
  "superseded_by": [],
  "status_notes": [],
  "references": [],
  "sections": {
    "decision": [
      "Files under `.ssot` MUST respect these limits:\n\n- Maximum relative path length: **240** characters.\n- Maximum filename length: **120** characters.\n\nValidation fails when either limit is exceeded."
    ],
    "consequences": [
      "- Repositories get deterministic, cross-platform-safe path constraints.\n- Oversized paths fail early during validation instead of surfacing later in tooling workflows.\n- Existing registries do not require schema migration because this is a validation policy change."
    ]
  }
}
