  "sections": {
    "scope": [
      "This is part of your operator contract in `.ssot/specs`."
    ],
    "origin_model": [
      "- `ssot-origin`: packaged contract docs synced from `ssot-registry` and immutable in operator repos.\n- `repo-local`: docs authored by your repository and editable locally.\n- `ssot-core`: upstream-only governance and not permitted in operator repositories."
    ],
    "numbering_and_reservations": [
      "- `1..599` is reserved for upstream `ssot-core` governance.\n- `600..999` is reserved for packaged `ssot-origin` docs.\n- `1000..4999` is assignable to `repo-local` docs."
    ],
    "required_locations": [
      "- ADR files SHALL live under `.ssot/adr`.\n- SPEC files SHALL live under `.ssot/specs`.\n- Registry metadata SHALL keep ADR/SPEC records under top-level `adrs` and `specs` in `.ssot/registry.json`."
    ]
  },
  "spec_kind": "operational"
