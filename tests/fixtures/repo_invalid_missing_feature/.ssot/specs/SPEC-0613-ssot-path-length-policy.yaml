  "references": [],
  "sections": {
    "scope": [
      "This specification defines path and filename limits for artifacts stored under `.ssot/`."
    ],
    "rules": [
      "For any file path that is under `.ssot`:\n\n1. The full repository-relative path MUST be at most **240** characters.\n2. The filename component MUST be at most **120** characters.\n\nThese limits apply to:\n\n- Declared `.ssot` paths in registry entities (for example evidence/documents).\n- Materialized files physically present under `.ssot`."
    ],
    "enforcement": [
      "Validation MUST fail when either rule is violated."
    ]
  },
  "spec_kind": "normative"
}
