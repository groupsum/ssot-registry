server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  etag on;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/ld+json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    add_header Cache-Control "no-store" always;
    return 200 "ok\n";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files /index.html =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ~* ^/(sitemap\.xml|robots\.txt|llms\.txt|llms-full\.txt|content-index\.json|semantic-index\.json|structured-data-graph\.json)$ {
    add_header Cache-Control "public, max-age=300, stale-while-revalidate=3600" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
