    <link rel="alternate" type="text/plain" title="SSOT Registry full LLM index" href="/llms-full.txt" />

    <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="192x192" />
    <style>
      :root {
        color: #102033;
        background: #eef4fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #eef4fb;
      }

      #root:empty,
      .app-boot-shell {
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 8%, rgba(79, 70, 229, 0.13), transparent 28rem),
          linear-gradient(180deg, #f8fafc 0%, #eef4fb 100%);
      }

      .app-boot-shell {
        display: grid;
        align-content: start;
        gap: 3rem;
        padding: 1rem;
      }

      .app-boot-nav,
      .app-boot-main {
        width: min(calc(100% - 2rem), 80rem);
        margin: 0 auto;
      }

      .app-boot-nav {
        display: flex;
        align-items: center;
        min-height: 4.75rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.36);
      }

      .app-boot-mark,
      .app-boot-line,
      .app-boot-block {
        border-radius: 0.5rem;
        background: linear-gradient(90deg, #dbe7f4 0%, #edf4fb 50%, #dbe7f4 100%);
        background-size: 220% 100%;
        animation: ssotBootPulse 1.2s ease-in-out infinite;
      }

      .app-boot-mark {
        display: grid;
        place-items: center;
        width: 2.5rem;
        height: 2.5rem;
        background: #0b1f3a;
        color: #ffffff;
        font-size: 1rem;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        animation: none;
      }

      .app-boot-main {
        display: grid;
        gap: 1rem;
        padding-top: 3rem;
      }

      .app-boot-line {
        height: 1rem;
      }

      .app-boot-line:first-child {
        width: min(32rem, 72vw);
        height: 3rem;
      }

      .app-boot-line:nth-child(2) {
        width: min(42rem, 82vw);
      }

      .app-boot-line:nth-child(3) {
        width: min(36rem, 74vw);
      }

      .app-boot-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 2rem;
      }

      .app-boot-block {
        min-height: 11rem;
      }

      .app-boot-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes ssotBootPulse {
        0% {
          background-position: 120% 0;
        }
        100% {
          background-position: -120% 0;
        }
      }

      @media (max-width: 720px) {
        .app-boot-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root" class="app-boot-shell" aria-busy="true">
      <span class="app-boot-sr">Loading SSOT Registry</span>
      <div class="app-boot-nav" aria-hidden="true">
        <div class="app-boot-mark">SR</div>
      </div>
      <main class="app-boot-main" aria-hidden="true">
        <div class="app-boot-line"></div>
        <div class="app-boot-line"></div>
        <div class="app-boot-line"></div>
        <div class="app-boot-grid">
          <div class="app-boot-block"></div>
          <div class="app-boot-block"></div>
          <div class="app-boot-block"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
