name: _Publish Built Package

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      package_tag:
        required: true
        type: string
      package_version:
        required: true
        type: string
      pypi_project_url:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      publish_to_pypi:
        required: false
        type: boolean
        default: true
      create_tag:
        required: false
        type: boolean
        default: true
      create_github_release:
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: ${{ inputs.pypi_project_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref_name }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Download release distributions
        uses: actions/download-artifact@v6
        with:
          name: release-distributions
          path: release-dist

      - name: Verify built package artifact
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          test -d "release-dist/$PACKAGE_NAME"
          test -f "release-dist/$PACKAGE_NAME/SHA256SUMS"
          ls -la "release-dist/$PACKAGE_NAME"

      - name: Create git tag from package version
        if: ${{ inputs.create_tag }}
        env:
          TAG: ${{ inputs.package_tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Verify package version and tag are in sync
        if: ${{ !inputs.create_tag }}
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          EXPECTED_TAG: ${{ inputs.package_tag }}
        run: |
          ACTUAL_TAG="${GITHUB_REF_NAME}"
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag and package version are out of sync for $PACKAGE_NAME."
            echo "Expected: $EXPECTED_TAG"
            echo "Actual:   $ACTUAL_TAG"
            exit 1
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.package_tag }}
          VERSION: ${{ inputs.package_version }}
          REF_NAME: ${{ inputs.ref_name }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          ARGS=(
            "$TAG"
            "release-dist/$PACKAGE_NAME"/*
            --target "$REF_NAME"
            --title "$TAG"
            --generate-notes
          )
          if [[ "$VERSION" == *".dev"* ]]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${ARGS[@]}"

      - name: Publish package distributions to PyPI
        if: ${{ inputs.publish_to_pypi }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: uv publish release-dist/$PACKAGE_NAME/*.whl release-dist/$PACKAGE_NAME/*.tar.gz
