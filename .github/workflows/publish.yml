name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install package
        run: uv sync --python 3.12

      - name: Verify release tag and package version are in sync
        if: ${{ github.event_name == 'release' }}
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PYPROJECT_VERSION=$(python - <<'PY'
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path('pyproject.toml').read_text())
          print(pyproject['project']['version'])
          PY
          )

          EXPECTED_TAG="ssot-registry==${PYPROJECT_VERSION}"
          if [ "$EXPECTED_TAG" != "$RELEASE_TAG" ]; then
            echo "Release tag and pyproject version are out of sync."
            echo "Expected: $EXPECTED_TAG"
            echo "Actual:   $RELEASE_TAG"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/ssot-registry
    steps:
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*
