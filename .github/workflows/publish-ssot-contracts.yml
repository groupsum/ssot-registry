name: Publish ssot-contracts

on:
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
      publish_to_pypi:
        required: false
        default: true
        type: boolean
      create_tag:
        required: false
        default: true
        type: boolean
      create_github_release:
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      ref_name:
        description: "Branch or ref name to publish from"
        required: true
        default: master
        type: string
      publish_to_pypi:
        description: "Publish package distributions to PyPI"
        required: true
        default: false
        type: boolean
      create_tag:
        description: "Create the package release tag before publishing"
        required: true
        default: true
        type: boolean
      create_github_release:
        description: "Create a GitHub Release for the package tag"
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-ssot-contracts-${{ inputs.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ssot-contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref_name }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Determine release version and tag
        id: release_meta
        env:
          PACKAGE_NAME: ssot-contracts
        run: |
          VERSION=$(python scripts/release_metadata.py version --package "$PACKAGE_NAME")
          TAG=$(python scripts/release_metadata.py tag --package "$PACKAGE_NAME")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create git tag from package version
        if: ${{ inputs.create_tag }}
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; continuing."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Verify package version and tag are in sync
        if: ${{ !inputs.create_tag }}
        env:
          PACKAGE_NAME: ssot-contracts
          EXPECTED_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          ACTUAL_TAG="${GITHUB_REF_NAME}"
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag and package version are out of sync for $PACKAGE_NAME."
            echo "Expected: $EXPECTED_TAG"
            echo "Actual:   $ACTUAL_TAG"
            exit 1
          fi

      - name: Build package
        run: uv build --project pkgs/ssot-contracts --out-dir pkgs/ssot-contracts/dist

      - name: Generate checksums
        run: |
          cd pkgs/ssot-contracts/dist
          sha256sum * > SHA256SUMS

      - name: Upload distribution
        uses: actions/upload-artifact@v6
        with:
          name: dist-ssot-contracts
          path: pkgs/ssot-contracts/dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_meta.outputs.tag }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          REF_NAME: ${{ inputs.ref_name }}
          PROJECT_PATH: pkgs/ssot-contracts
        run: |
          ARGS=(
            "$TAG"
            "$PROJECT_PATH"/dist/*
            --target "$REF_NAME"
            --title "$TAG"
            --generate-notes
          )
          if [[ "$VERSION" == *".dev"* ]]; then
            ARGS+=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists; continuing."
            exit 0
          fi
          gh release create "${ARGS[@]}"

      - name: Publish package distributions to PyPI
        if: ${{ inputs.publish_to_pypi }}
        env:
          PROJECT_PATH: pkgs/ssot-contracts
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ "$PROJECT_PATH"/dist/*
