name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-ci:
    name: ${{ matrix.package_name }} (Python ${{ matrix.python_version }})
    strategy:
      fail-fast: false
      matrix:
        package_name:
          - ssot-contracts
          - ssot-pack-contracts
          - ssot-views
          - ssot-codegen
          - ssot-core
          - ssot-conformance
          - ssot-registry
          - ssot-cli
          - ssot-mcp
          - ssot-tui
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - package_name: ssot-contracts
            project_path: pkgs/ssot-contracts
            compile_paths: pkgs/ssot-contracts/src
            test_command: python -c "import ssot_contracts"
            verify_packaged_docs: true
          - package_name: ssot-pack-contracts
            project_path: pkgs/ssot-pack-contracts
            compile_paths: pkgs/ssot-pack-contracts/src
            test_command: python -c "import ssot_pack_contracts"
            verify_packaged_docs: false
          - package_name: ssot-views
            project_path: pkgs/ssot-views
            compile_paths: pkgs/ssot-views/src
            test_command: python -c "import ssot_views"
            verify_packaged_docs: false
          - package_name: ssot-codegen
            project_path: pkgs/ssot-codegen
            compile_paths: pkgs/ssot-codegen/src
            test_command: python -c "import ssot_codegen"
            verify_packaged_docs: false
          - package_name: ssot-core
            project_path: pkgs/ssot-core
            compile_paths: pkgs/ssot-core/src
            test_command: python -c "import ssot_registry"
            verify_packaged_docs: false
          - package_name: ssot-conformance
            project_path: pkgs/ssot-conformance
            compile_paths: pkgs/ssot-conformance/src
            test_command: python -c "import ssot_conformance"
            verify_packaged_docs: false
          - package_name: ssot-registry
            project_path: pkgs/ssot-registry
            compile_paths: pkgs/ssot-registry
            test_command: python -c "import ssot_registry"
            verify_packaged_docs: false
          - package_name: ssot-cli
            project_path: pkgs/ssot-cli
            compile_paths: pkgs/ssot-cli/src
            test_command: python -c "import ssot_cli"
            verify_packaged_docs: false
          - package_name: ssot-mcp
            project_path: pkgs/ssot-mcp
            compile_paths: pkgs/ssot-mcp/src
            test_command: python -c "import ssot_mcp"
            verify_packaged_docs: false
          - package_name: ssot-tui
            project_path: pkgs/ssot-tui
            compile_paths: pkgs/ssot-tui/src
            test_command: python -c "import ssot_tui"
            verify_packaged_docs: false
    uses: ./.github/workflows/_package-ci.yml
    with:
      package_name: ${{ matrix.package_name }}
      project_path: ${{ matrix.project_path }}
      compile_paths: ${{ matrix.compile_paths }}
      test_command: ${{ matrix.test_command }}
      verify_packaged_docs: ${{ matrix.verify_packaged_docs }}
      python_version: ${{ matrix.python_version }}

  shared-tests:
    name: Shared Tests (Python ${{ matrix.python_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python_version }}
        run: uv python install ${{ matrix.python_version }}

      - name: Install workspace runtime
        run: uv sync --python ${{ matrix.python_version }} --package ssot-registry

      - name: Run shared test suite once
        run: uv run --python ${{ matrix.python_version }} --package ssot-registry --no-sync python -m unittest discover -s tests -v

  release-build-smoke:
    name: Release Build Smoke
    runs-on: ubuntu-latest
    needs: [package-ci, shared-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Validate core release train metadata
        run: python scripts/release_metadata.py validate-train --train core

      - name: Build all packages from package roots
        run: |
          uv build --project pkgs/ssot-contracts --out-dir pkgs/ssot-contracts/dist
          uv build --project pkgs/ssot-pack-contracts --out-dir pkgs/ssot-pack-contracts/dist
          uv build --project pkgs/ssot-views --out-dir pkgs/ssot-views/dist
          uv build --project pkgs/ssot-codegen --out-dir pkgs/ssot-codegen/dist
          uv build --project pkgs/ssot-core --out-dir pkgs/ssot-core/dist
          uv build --project pkgs/ssot-conformance --out-dir pkgs/ssot-conformance/dist
          uv build --project pkgs/ssot-cli --out-dir pkgs/ssot-cli/dist
          uv build --project pkgs/ssot-mcp --out-dir pkgs/ssot-mcp/dist
          uv build --project pkgs/ssot-tui --out-dir pkgs/ssot-tui/dist
          uv build --project pkgs/ssot-registry --out-dir pkgs/ssot-registry/dist

      - name: Install local release train artifacts in dependency order
        run: |
          python -m venv .venv-release-smoke
          . .venv-release-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pkgs/ssot-contracts/dist/*.whl
          python -m pip install pkgs/ssot-pack-contracts/dist/*.whl
          python -m pip install pkgs/ssot-views/dist/*.whl
          python -m pip install pkgs/ssot-codegen/dist/*.whl
          python -m pip install pkgs/ssot-core/dist/*.whl
          python -m pip install pkgs/ssot-conformance/dist/*.whl
          python -m pip install pkgs/ssot-cli/dist/*.whl
          python -m pip install pkgs/ssot-mcp/dist/*.whl
          python -m pip install pkgs/ssot-tui/dist/*.whl
          python -m pip install pkgs/ssot-registry/dist/*.whl

      - name: Verify runtime imports against packaged artifacts
        run: |
          . .venv-release-smoke/bin/activate
          python -c "import ssot_contracts, ssot_views, ssot_codegen, ssot_registry, ssot_conformance, ssot_cli, ssot_mcp"
