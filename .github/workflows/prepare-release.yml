name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_train:
        description: "Release train to bump"
        required: true
        default: core
        type: choice
        options:
          - core
          - all
          - ssot-contracts
          - ssot-views
          - ssot-codegen
          - ssot-core
          - ssot-conformance
          - ssot-registry
          - ssot-cli
          - ssot-tui
          - selected
      selected_packages:
        description: "Comma-separated package list when release_train=selected"
        required: false
        default: ""
        type: string
      bump_type:
        description: "Version bump type {major,minor,patch,finalize}"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - finalize
      run_release:
        description: "Run release workflow after a successful bump commit"
        required: true
        default: true
        type: boolean
      publish_to_pypi:
        description: "Publish packages to PyPI when the release workflow runs"
        required: true
        default: false
        type: boolean

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  bump-version:
    name: Bump package versions
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.bump_version.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate train policy
        run: python scripts/release_metadata.py validate-train --train "${{ inputs.release_train }}" --packages "${{ inputs.selected_packages }}"

      - name: Bump selected release train
        id: bump_version
        run: |
          python scripts/bump_release_train.py --train "${{ inputs.release_train }}" --bump "${{ inputs.bump_type }}" --packages "${{ inputs.selected_packages }}" > changed_files.txt
          CHANGED=$(python - <<'PY'
          from pathlib import Path
          changed = [line.strip() for line in Path("changed_files.txt").read_text(encoding="utf-8").splitlines() if line.strip()]
          print(" ".join(changed))
          PY
          )
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit bumped versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ${{ steps.bump_version.outputs.changed_files }}
          git commit -m "chore(release): bump ${{ inputs.release_train }} versions"
          git push origin "HEAD:${{ github.ref_name }}"

  release:
    name: Trigger release workflow
    needs: bump-version
    if: ${{ inputs.run_release }}
    uses: ./.github/workflows/release.yml
    with:
      release_train: ${{ inputs.release_train }}
      ref_name: ${{ github.ref_name }}
      selected_packages: ${{ inputs.selected_packages }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_github_release: true
    secrets: inherit
