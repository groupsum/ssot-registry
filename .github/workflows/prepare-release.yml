name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type {major,minor,patch,finalize}"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - finalize
      run_release:
        description: "Run release workflow after a successful bump commit"
        required: true
        default: true
        type: boolean

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump-version:
    name: Auto-increment version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Auto-increment package version
        id: bump_version
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          python scripts/bump_pyproject_version.py --bump "$BUMP_TYPE" pyproject.toml
          VERSION=$(python - <<'PY'
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path('pyproject.toml').read_text())
          print(pyproject['project']['version'])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.bump_version.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"

  release:
    name: Trigger release workflow
    needs: bump-version
    if: ${{ inputs.run_release }}
    uses: ./.github/workflows/release.yml
    with:
      ref_name: ${{ github.ref_name }}
    secrets: inherit
