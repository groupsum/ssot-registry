name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type {major,minor,patch,finalize}"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - finalize

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Bump, build and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install package
        run: uv sync --python 3.12

      - name: Auto-increment package version
        id: bump_version
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          python scripts/bump_pyproject_version.py --bump "$BUMP_TYPE" pyproject.toml
          VERSION=$(python - <<'PY'
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path('pyproject.toml').read_text())
          print(pyproject['project']['version'])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.bump_version.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Determine release tag
        id: release_meta
        run: |
          VERSION="${{ steps.bump_version.outputs.version }}"
          TAG="ssot-registry==${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create git tag from pyproject version
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build package
        run: uv build

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.ref_name }}
          name: ssot-registry ${{ steps.bump_version.outputs.version }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.bump_version.outputs.version, '.dev') }}
