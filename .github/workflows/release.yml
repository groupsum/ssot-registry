name: Release

on:
  workflow_call:
    inputs:
      release_train:
        description: "Release train to publish"
        required: true
        type: string
      ref_name:
        description: "Branch or ref name to release from"
        required: true
        type: string
      selected_packages:
        description: "Comma-separated package list when release_train=selected"
        required: false
        default: ""
        type: string
      publish_to_pypi:
        description: "Publish to PyPI after building artifacts"
        required: false
        default: true
        type: boolean
      create_github_release:
        description: "Create GitHub Releases for package tags"
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      release_train:
        description: "Release train to publish"
        required: true
        default: core
        type: choice
        options:
          - core
          - all
          - ssot-contracts
          - ssot-pack-contracts
          - ssot-views
          - ssot-codegen
          - ssot-core
          - ssot-conformance
          - ssot-registry
          - ssot-cli
          - ssot-mcp
          - ssot-tui
          - selected
      ref_name:
        description: "Branch or ref name to release from"
        required: true
        default: master
        type: string
      selected_packages:
        description: "Comma-separated package list when release_train=selected"
        required: false
        default: ""
        type: string
      publish_to_pypi:
        description: "Publish to PyPI after building artifacts"
        required: true
        default: true
        type: boolean
      create_github_release:
        description: "Create GitHub Releases for package tags"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ inputs.release_train }}-${{ inputs.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Validate release train
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      publish_layer_1: ${{ steps.targets.outputs.publish_layer_1 }}
      publish_layer_2: ${{ steps.targets.outputs.publish_layer_2 }}
      publish_layer_3: ${{ steps.targets.outputs.publish_layer_3 }}
      publish_layer_4: ${{ steps.targets.outputs.publish_layer_4 }}
      publish_layer_5: ${{ steps.targets.outputs.publish_layer_5 }}
      publish_layer_6: ${{ steps.targets.outputs.publish_layer_6 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref_name }}

      - name: Install Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate train policy
        run: python scripts/release_metadata.py validate-train --train "${{ inputs.release_train }}" --packages "${{ inputs.selected_packages }}"

      - name: Resolve release targets
        id: targets
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          metadata = json.loads(
              subprocess.run(
                  ["python", "scripts/release_metadata.py", "show"],
                  check=True,
                  text=True,
                  capture_output=True,
              ).stdout
          )
          targets = json.loads(
              subprocess.run(
                  [
                      "python",
                      "scripts/release_metadata.py",
                      "targets",
                      "--train",
                      os.environ["RELEASE_TRAIN"],
                      "--packages",
                      os.environ["SELECTED_PACKAGES"],
                  ],
                  check=True,
                  text=True,
                  capture_output=True,
              ).stdout
          )
          package_meta = metadata["packages"]
          layers = [
              ("publish_layer_1", ["ssot-contracts", "ssot-pack-contracts"]),
              ("publish_layer_2", ["ssot-views"]),
              ("publish_layer_3", ["ssot-codegen", "ssot-core"]),
              ("publish_layer_4", ["ssot-conformance"]),
              ("publish_layer_5", ["ssot-cli", "ssot-mcp", "ssot-tui"]),
              ("publish_layer_6", ["ssot-registry"]),
          ]

          def package_payload(package_name):
              info = package_meta[package_name]
              return {
                  "name": package_name,
                  "project_path": info["project_path"],
                  "pypi_url": info["pypi_url"],
                  "tag": info["tag"],
                  "version": info["version"],
              }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"targets={json.dumps(targets, separators=(',', ':'))}\n")
              for output_name, package_names in layers:
                  layer_targets = [
                      package_payload(package_name)
                      for package_name in package_names
                  ]
                  handle.write(
                      f"{output_name}={json.dumps(layer_targets, separators=(',', ':'))}\n"
                  )
          PY
        env:
          RELEASE_TRAIN: ${{ inputs.release_train }}
          SELECTED_PACKAGES: ${{ inputs.selected_packages }}

  build-distributions:
    name: Build selected distributions once
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref_name }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Build selected packages
        env:
          RELEASE_TARGETS: ${{ needs.validate.outputs.targets }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import shutil
          import subprocess
          from pathlib import Path

          targets = json.loads(os.environ["RELEASE_TARGETS"])
          metadata = json.loads(
              subprocess.run(
                  ["python", "scripts/release_metadata.py", "show"],
                  check=True,
                  text=True,
                  capture_output=True,
              ).stdout
          )

          dist_root = Path("release-dist")
          if dist_root.exists():
              shutil.rmtree(dist_root)
          dist_root.mkdir()

          for package_name in targets:
              package = metadata["packages"][package_name]
              package_dist = dist_root / package_name
              package_dist.mkdir(parents=True, exist_ok=True)
              subprocess.run(
                  [
                      "uv",
                      "build",
                      "--project",
                      package["project_path"],
                      "--out-dir",
                      str(package_dist),
                  ],
                  check=True,
              )

              checksum_lines = []
              for path in sorted(package_dist.iterdir()):
                  if path.is_file() and path.name != "SHA256SUMS":
                      digest = hashlib.sha256(path.read_bytes()).hexdigest()
                      checksum_lines.append(f"{digest}  {path.name}")
              (package_dist / "SHA256SUMS").write_text(
                  "\n".join(checksum_lines) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Upload release distributions
        uses: actions/upload-artifact@v6
        with:
          name: release-distributions
          path: release-dist/**
          if-no-files-found: error

  publish-ssot-contracts:
    name: Publish ssot-contracts
    needs: [validate, build-distributions]
    if: ${{ needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-contracts') }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-contracts
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_1)[0].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_1)[0].version }}
      pypi_project_url: https://pypi.org/p/ssot-contracts
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-pack-contracts:
    name: Publish ssot-pack-contracts
    needs: [validate, build-distributions]
    if: ${{ needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-pack-contracts') }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-pack-contracts
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_1)[1].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_1)[1].version }}
      pypi_project_url: https://pypi.org/p/ssot-pack-contracts
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-views:
    name: Publish ssot-views
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-views') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-views
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_2)[0].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_2)[0].version }}
      pypi_project_url: https://pypi.org/p/ssot-views
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-codegen:
    name: Publish ssot-codegen
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts, publish-ssot-views]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-codegen') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-views.result) }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-codegen
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_3)[0].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_3)[0].version }}
      pypi_project_url: https://pypi.org/p/ssot-codegen
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-core:
    name: Publish ssot-core
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts, publish-ssot-views]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-core') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-views.result) }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-core
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_3)[1].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_3)[1].version }}
      pypi_project_url: https://pypi.org/p/ssot-core
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-conformance:
    name: Publish ssot-conformance
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts, publish-ssot-views, publish-ssot-codegen, publish-ssot-core]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-conformance') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-views.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-codegen.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-core.result) }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-conformance
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_4)[0].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_4)[0].version }}
      pypi_project_url: https://pypi.org/p/ssot-conformance
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-cli:
    name: Publish ssot-cli
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts, publish-ssot-views, publish-ssot-codegen, publish-ssot-core, publish-ssot-conformance]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-cli') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-views.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-codegen.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-core.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-conformance.result) }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-cli
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[0].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[0].version }}
      pypi_project_url: https://pypi.org/p/ssot-cli
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-tui:
    name: Publish ssot-tui
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts, publish-ssot-views, publish-ssot-codegen, publish-ssot-core, publish-ssot-conformance]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-tui') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-views.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-codegen.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-core.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-conformance.result) }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-tui
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[2].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[2].version }}
      pypi_project_url: https://pypi.org/p/ssot-tui
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit

  publish-ssot-mcp:
    name: Publish ssot-mcp
    runs-on: ubuntu-latest
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts, publish-ssot-views, publish-ssot-codegen, publish-ssot-core, publish-ssot-conformance]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-mcp') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-views.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-codegen.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-core.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-conformance.result) }}
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/ssot-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref_name }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Download release distributions
        uses: actions/download-artifact@v6
        with:
          name: release-distributions
          path: release-dist

      - name: Verify built package artifact
        run: |
          test -d "release-dist/ssot-mcp"
          test -f "release-dist/ssot-mcp/SHA256SUMS"
          ls -la "release-dist/ssot-mcp"

      - name: Create git tag from package version
        env:
          TAG: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[1].tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; continuing."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[1].tag }}
          VERSION: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[1].version }}
        run: |
          ARGS=(
            "$TAG"
            release-dist/ssot-mcp/*
            --target "${{ inputs.ref_name }}"
            --title "$TAG"
            --generate-notes
          )
          if [[ "$VERSION" == *".dev"* ]]; then
            ARGS+=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists; continuing."
            exit 0
          fi
          gh release create "${ARGS[@]}"

      - name: Check PyPI version availability
        id: pypi_version
        if: ${{ inputs.publish_to_pypi }}
        env:
          VERSION: ${{ fromJSON(needs.validate.outputs.publish_layer_5)[1].version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from html.parser import HTMLParser
          from urllib.parse import unquote, urlparse


          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.hrefs = []

              def handle_starttag(self, tag, attrs):
                  if tag != "a":
                      return
                  for name, value in attrs:
                      if name == "href" and value:
                          self.hrefs.append(value)


          def normalized_project_name(name):
              return re.sub(r"[-_.]+", "-", name).lower()


          def distribution_prefix(name):
              return re.sub(r"[-_.]+", "_", name).lower()


          def filename_matches_version(filename, package_name, version):
              prefix = f"{distribution_prefix(package_name)}-{version}".lower()
              return (
                  filename in {f"{prefix}.tar.gz", f"{prefix}.zip"}
                  or (filename.startswith(f"{prefix}-") and filename.endswith(".whl"))
              )


          def simple_index_has_version(package_name, version):
              project = normalized_project_name(package_name)
              url = f"https://pypi.org/simple/{project}/"
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      html = response.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return False
                  raise

              parser = LinkParser()
              parser.feed(html)
              for href in parser.hrefs:
                  path = urlparse(href).path
                  filename = unquote(path.rsplit("/", 1)[-1]).lower()
                  if filename_matches_version(filename, package_name, version):
                      return True
              return False

          package_name = "ssot-mcp"
          version = os.environ["VERSION"]
          exists = False
          url = f"https://pypi.org/pypi/{package_name}/json"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  payload = json.load(response)
              exists = bool(payload.get("releases", {}).get(version))
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          if not exists:
              exists = simple_index_has_version(package_name, version)

          print(f"PyPI version exists for {package_name} {version}: {str(exists).lower()}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={str(exists).lower()}\n")
          PY

      - name: Publish package distributions to PyPI
        if: ${{ inputs.publish_to_pypi && steps.pypi_version.outputs.exists != 'true' }}
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ release-dist/ssot-mcp/*.whl release-dist/ssot-mcp/*.tar.gz

  publish-ssot-registry:
    name: Publish ssot-registry
    needs: [validate, build-distributions, publish-ssot-contracts, publish-ssot-pack-contracts, publish-ssot-views, publish-ssot-codegen, publish-ssot-core, publish-ssot-conformance, publish-ssot-cli, publish-ssot-mcp, publish-ssot-tui]
    if: ${{ always() && needs.build-distributions.result == 'success' && contains(fromJSON(needs.validate.outputs.targets), 'ssot-registry') && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-pack-contracts.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-views.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-codegen.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-core.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-conformance.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-cli.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-mcp.result) && contains(fromJSON('["success","skipped"]'), needs.publish-ssot-tui.result) }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/_publish-built-package.yml
    with:
      package_name: ssot-registry
      package_tag: ${{ fromJSON(needs.validate.outputs.publish_layer_6)[0].tag }}
      package_version: ${{ fromJSON(needs.validate.outputs.publish_layer_6)[0].version }}
      pypi_project_url: https://pypi.org/p/ssot-registry
      ref_name: ${{ inputs.ref_name }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_tag: true
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit
