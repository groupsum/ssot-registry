name: Publish ssot-pack-contracts

on:
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
      publish_to_pypi:
        required: false
        default: true
        type: boolean
      create_tag:
        required: false
        default: true
        type: boolean
      create_github_release:
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      ref_name:
        description: "Branch or ref name to publish from"
        required: true
        default: master
        type: string
      publish_to_pypi:
        description: "Publish package distributions to PyPI"
        required: true
        default: false
        type: boolean
      create_tag:
        description: "Create the package release tag before publishing"
        required: true
        default: true
        type: boolean
      create_github_release:
        description: "Create a GitHub Release for the package tag"
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-ssot-pack-contracts-${{ inputs.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      release_train: ssot-pack-contracts
      ref_name: ${{ inputs.ref_name }}
      selected_packages: ""
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      create_github_release: ${{ inputs.create_github_release }}
    secrets: inherit
