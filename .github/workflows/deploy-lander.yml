name: Deploy SSOT Registry Lander

on:
  workflow_dispatch:
    inputs:
      manage_public_proxy:
        description: "Allow the public lander endpoint admin flow."
        required: false
        default: false
        type: boolean
      rotate_certificate:
        description: "Allow DNS, reverse proxy, and certificate mutation for the public lander endpoints."
        required: false
        default: false
        type: boolean

concurrency:
  group: ssot-registry-lander-deploy
  cancel-in-progress: false

env:
  DOMAIN_NAME: ssot-registry.com
  SERVER_IP: ${{ secrets.SERVER_IP }}
  FORWARD_PORT: ${{ secrets.FORWARD_PORT }}
  NPM_BASE_URL: ${{ secrets.NPM_BASE_URL }}
  NPM_IDENTITY: ${{ secrets.NPM_EMAIL }}
  NPM_SECRET: ${{ secrets.NPM_SECRET }}
  LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
  NAMECHEAP_USERNAME: ${{ secrets.NAMECHEAP_USERNAME }}
  NAMECHEAP_API_USER: ${{ secrets.NAMECHEAP_API_USER }}
  NAMECHEAP_API_KEY: ${{ secrets.NAMECHEAP_API_KEY }}
  NAMECHEAP_CLIENT_IP: ${{ secrets.NAMECHEAP_CLIENT_IP }}

jobs:
  deploy:
    runs-on: deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow inputs
        if: ${{ inputs.rotate_certificate }}
        shell: bash
        run: |
          if [ "${{ inputs.manage_public_proxy }}" != "true" ]; then
            echo "rotate_certificate=true requires manage_public_proxy=true"
            exit 1
          fi

      - name: Verify required secrets
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        shell: bash
        run: |
          missing=0
          for name in SERVER_IP FORWARD_PORT NPM_BASE_URL NPM_IDENTITY NPM_SECRET LETSENCRYPT_EMAIL NAMECHEAP_USERNAME NAMECHEAP_API_USER NAMECHEAP_API_KEY NAMECHEAP_CLIENT_IP; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret-backed environment value: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Select Docker Compose command
        shell: bash
        run: |
          if docker compose version >/dev/null 2>&1; then
            echo 'COMPOSE_CMD=docker compose' >> "$GITHUB_ENV"
          elif command -v docker-compose >/dev/null 2>&1; then
            echo 'COMPOSE_CMD=docker-compose' >> "$GITHUB_ENV"
          else
            echo "Neither docker compose nor docker-compose is available"
            exit 1
          fi

      - name: Deploy Docker container
        shell: bash
        run: |
          docker ps -aq --filter "name=ssot-registry_lander" | while read -r container_id; do
            [ -n "$container_id" ] && docker rm -f "$container_id" >/dev/null 2>&1 || true
          done
          $COMPOSE_CMD up -d --build --remove-orphans

      - name: Wait for local health check
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://127.0.0.1:${FORWARD_PORT}/healthz"; then
              exit 0
            fi
            sleep 2
          done
          $COMPOSE_CMD ps
          $COMPOSE_CMD logs --no-color --tail=100
          exit 1

      - name: Setup uv
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Create uv virtualenv
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        run: |
          uv python install 3.12
          uv venv --python 3.12 .venv

      - name: Install npmctl and Namecheap DNS provider with uv
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        run: uv pip install "npmctl==0.3.2" "npmctl-namecheap==0.3.2"

      - name: Verify npmctl Namecheap provider
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        run: |
          uv run npmctl dns providers
          uv run npmctl dns doctor --provider namecheap

      - name: Configure Namecheap DNS records
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        run: uv run python scripts/namecheap_dns.py

      - name: Write npmctl desired state
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        run: uv run python scripts/write_npmctl_state.py

      - name: Validate npmctl desired state
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        run: uv run npmctl validate desired-state

      - name: Plan NPM changes
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        shell: bash
        run: |
          retry_certbot_locked() {
            local attempt exit_code output_file
            for attempt in 1 2 3 4 5; do
              output_file="$(mktemp)"
              set +e
              "$@" >"$output_file" 2>&1
              exit_code=$?
              set -e

              cat "$output_file"
              if [ "$exit_code" -eq 0 ]; then
                rm -f "$output_file"
                return 0
              fi

              if grep -q "Another instance of Certbot is already running." "$output_file"; then
                rm -f "$output_file"
                echo "::warning::Certbot is locked by another NPM certificate operation. Retrying in 15 seconds (attempt ${attempt}/5)."
                sleep 15
                continue
              fi

              rm -f "$output_file"
              return "$exit_code"
            done

            echo "::error::Timed out waiting for the NPM certificate lock to clear."
            return 1
          }

          set +e
          output_file="$(mktemp)"
          uv run npmctl plan desired-state --owner ssot-registry >"$output_file" 2>&1
          status=$?
          set -e

          cat "$output_file"
          if [ "$status" -eq 0 ]; then
            rm -f "$output_file"
            exit 0
          fi

          if grep -q "unmanaged_resource: proxy_host" "$output_file"; then
            echo "::warning::npmctl plan found an unmanaged existing proxy_host for ${DOMAIN_NAME}; adopting the matching live resource into the ssot-registry owner scope."
            rm -f "$output_file"
            retry_certbot_locked uv run npmctl adopt desired-state --owner ssot-registry --force
            uv run npmctl plan desired-state --owner ssot-registry
            exit 0
          fi

          rm -f "$output_file"
          exit "$status"

      - name: Apply NPM reverse proxy and SSL
        if: ${{ inputs.manage_public_proxy && inputs.rotate_certificate }}
        shell: bash
        run: |
          attempt=1
          while [ "$attempt" -le 5 ]; do
            set +e
            output_file="$(mktemp)"
            uv run npmctl apply desired-state --owner ssot-registry >"$output_file" 2>&1
            status=$?
            set -e

            cat "$output_file"
            if [ "$status" -eq 0 ]; then
              rm -f "$output_file"
              exit 0
            fi

            if grep -q "too many certificates" "$output_file"; then
              echo "::warning::Let's Encrypt exact-set rate limit hit during certificate issuance; reusing the existing public endpoint state for this deploy run."
              rm -f "$output_file"
              exit 0
            fi

            if grep -q "Another instance of Certbot is already running." "$output_file"; then
              rm -f "$output_file"
              echo "::warning::Certbot is locked by another NPM certificate operation. Retrying in 15 seconds (attempt ${attempt}/5)."
              attempt=$((attempt + 1))
              sleep 15
              continue
            fi

            rm -f "$output_file"
            exit "$status"
          done

          echo "::error::Timed out waiting for the NPM certificate lock to clear."
          exit 1

      - name: Verify public endpoints
        if: ${{ inputs.manage_public_proxy }}
        shell: bash
        run: |
          if [ "${{ inputs.rotate_certificate }}" != "true" ]; then
            echo "::notice::Skipping public proxy mutation because rotate_certificate was not enabled; verifying the existing public endpoints only."
          fi

          for url in "https://${DOMAIN_NAME}" "https://www.${DOMAIN_NAME}"; do
            for attempt in {1..40}; do
              if curl --fail --silent --show-error "$url" | grep -q "Hello, world."; then
                echo "$url is serving the app"
                break
              fi
              if [ "$attempt" -eq 40 ]; then
                echo "Timed out waiting for $url"
                exit 1
              fi
              sleep 15
            done
          done
