name: _Package Publish

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      pypi_project_url:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      publish_to_pypi:
        required: false
        type: boolean
        default: true
      create_tag:
        required: false
        type: boolean
        default: true
      create_github_release:
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: ${{ inputs.pypi_project_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref_name }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Determine release version and tag
        id: release_meta
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          VERSION=$(python scripts/release_metadata.py version --package "$PACKAGE_NAME")
          TAG=$(python scripts/release_metadata.py tag --package "$PACKAGE_NAME")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create git tag from package version
        if: ${{ inputs.create_tag }}
        env:
          TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; continuing."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Verify package version and tag are in sync
        if: ${{ !inputs.create_tag }}
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          EXPECTED_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          ACTUAL_TAG="${GITHUB_REF_NAME}"
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag and package version are out of sync for $PACKAGE_NAME."
            echo "Expected: $EXPECTED_TAG"
            echo "Actual:   $ACTUAL_TAG"
            exit 1
          fi

      - name: Build package
        run: uv build --project ${{ inputs.project_path }} --out-dir ${{ inputs.project_path }}/dist

      - name: Generate checksums
        run: |
          cd ${{ inputs.project_path }}/dist
          sha256sum * > SHA256SUMS

      - name: Upload distribution
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ inputs.package_name }}
          path: ${{ inputs.project_path }}/dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_meta.outputs.tag }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          REF_NAME: ${{ inputs.ref_name }}
          PROJECT_PATH: ${{ inputs.project_path }}
        run: |
          ARGS=(
            "$TAG"
            "$PROJECT_PATH"/dist/*
            --target "$REF_NAME"
            --title "$TAG"
            --generate-notes
          )
          if [[ "$VERSION" == *".dev"* ]]; then
            ARGS+=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists; continuing."
            exit 0
          fi
          gh release create "${ARGS[@]}"

      - name: Check PyPI version availability
        id: pypi_version
        if: ${{ inputs.publish_to_pypi }}
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from html.parser import HTMLParser
          from urllib.parse import unquote, urlparse


          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.hrefs = []

              def handle_starttag(self, tag, attrs):
                  if tag != "a":
                      return
                  for name, value in attrs:
                      if name == "href" and value:
                          self.hrefs.append(value)


          def normalized_project_name(name):
              return re.sub(r"[-_.]+", "-", name).lower()


          def distribution_prefix(name):
              return re.sub(r"[-_.]+", "_", name).lower()


          def filename_matches_version(filename, package_name, version):
              prefix = f"{distribution_prefix(package_name)}-{version}".lower()
              return (
                  filename in {f"{prefix}.tar.gz", f"{prefix}.zip"}
                  or (filename.startswith(f"{prefix}-") and filename.endswith(".whl"))
              )


          def simple_index_has_version(package_name, version):
              project = normalized_project_name(package_name)
              url = f"https://pypi.org/simple/{project}/"
              try:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      html = response.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return False
                  raise

              parser = LinkParser()
              parser.feed(html)
              for href in parser.hrefs:
                  path = urlparse(href).path
                  filename = unquote(path.rsplit("/", 1)[-1]).lower()
                  if filename_matches_version(filename, package_name, version):
                      return True
              return False

          package_name = os.environ["PACKAGE_NAME"]
          version = os.environ["VERSION"]
          exists = False
          url = f"https://pypi.org/pypi/{package_name}/json"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  payload = json.load(response)
              exists = bool(payload.get("releases", {}).get(version))
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          if not exists:
              exists = simple_index_has_version(package_name, version)

          print(f"PyPI version exists for {package_name} {version}: {str(exists).lower()}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={str(exists).lower()}\n")
          PY

      - name: Publish package distributions to PyPI
        if: ${{ inputs.publish_to_pypi && steps.pypi_version.outputs.exists != 'true' }}
        env:
          PROJECT_PATH: ${{ inputs.project_path }}
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ "$PROJECT_PATH"/dist/*
