[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-pack-contracts"
version = "0.2.19.dev5"
description = "Shared governance-pack metadata, manifest, and packaged document contracts for SSOT."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
  "tomli>=2.0.1; python_version < '3.11'",
]
keywords = ["ssot", "governance", "packs", "contracts", "metadata", "manifest"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-pack-contracts"
Repository = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-pack-contracts"
Issues = "https://github.com/groupsum/ssot-registry/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"ssot_pack_contracts" = ["py.typed"]
