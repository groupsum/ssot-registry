[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-cli"
version = "0.1.0"
description = "Primary CLI distribution for ssot-registry."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
  "ssot-registry>=0.2.3,<0.3.0",
]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry"
Repository = "https://github.com/groupsum/ssot-registry"
Issues = "https://github.com/groupsum/ssot-registry/issues"

[project.scripts]
ssot = "ssot_cli.main:main"
ssot-cli = "ssot_cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
