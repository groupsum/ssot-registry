[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-views"
version = "0.2.15.dev1"
description = "Derived projections, reports, and graph exports for SSOT."
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
  "ssot-contracts==0.2.15.dev1",
  "tomli>=2.0.1; python_version < '3.11'",
]
keywords = ["ssot", "views", "reports", "graph", "projections", "visualization", "registry"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Information Technology",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Database",
  "Topic :: Office/Business",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Topic :: Software Development :: Documentation",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-views"
Repository = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-views"
Issues = "https://github.com/groupsum/ssot-registry/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
