  "slug": "generated-projections-are-non-canonical",
  "title": "Generated projections are non-canonical",
  "status": "draft",
  "origin": "ssot-origin",
  "decision_date": null,
  "tags": [],
  "summary": "This is an `ssot-origin` ADR copied into downstream SSOT repositories.",
  "supersedes": [],
  "superseded_by": [],
  "status_notes": [],
  "references": [],
  "sections": {
    "decision": [
      "This is an `ssot-origin` ADR copied into downstream SSOT repositories.\n\nIn an operator repository, canonical authored SSOT content lives under `.ssot/`:\n\n- `.ssot/registry.json`,\n- repo-local ADRs under `.ssot/adr/`,\n- repo-local specs under `.ssot/specs/`.\n\nPackaged `ssot-origin` ADRs/specs provide baseline policy, but operators do not edit those synced copies directly.\n\nGenerated projections include:\n\n- graph exports,\n- reports and snapshots,\n- rendered or exported representations such as CSV, YAML, TOML, DOT, PNG, and SVG,\n- mirrored or regenerated documentation derived from the canonical SSOT content."
    ],
    "consequences": [
      "- Operators SHALL edit repo-local canonical SSOT content, not derived projections.\n- Operators SHALL treat synced `ssot-origin` docs as immutable baseline content.\n- Projection generation MUST be deterministic.\n- Manual edits to generated projections are treated as drift and MAY be overwritten by regeneration."
    ]
  }
}
