[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-contracts"
version = "0.2.13"
description = "Canonical schemas, templates, manifests, and generated Python contract artifacts for SSOT."
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = ["tomli>=2.0.1; python_version < '3.11'"]
keywords = ["ssot", "contracts", "schema", "json-schema", "templates", "manifests", "registry"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Information Technology",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: File Formats :: JSON",
  "Topic :: File Formats :: JSON :: JSON Schema",
  "Topic :: Software Development :: Documentation",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Software Development :: Quality Assurance",
  "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-contracts"
Repository = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-contracts"
Issues = "https://github.com/groupsum/ssot-registry/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"ssot_contracts.schema" = ["*.json"]
"ssot_contracts.templates" = ["*.json"]
"ssot_contracts.templates.adr" = ["*.json"]
"ssot_contracts.templates.specs" = ["*.json"]
