[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-mcp"
version = "0.1.1.dev2"
description = "MCP server for optional SSOT pull-worker control-plane coordination."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
  "mcp>=1.0",
  "ssot-core>=0.2.19.dev2,<0.3.0",
]
keywords = ["ssot", "mcp", "model-context-protocol", "codex", "workers", "leases", "control-plane", "registry", "developer-tools", "automation"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Framework :: AsyncIO",
  "Intended Audience :: Developers",
  "Intended Audience :: Information Technology",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Database",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Quality Assurance",
  "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-mcp"
Repository = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-mcp"
Issues = "https://github.com/groupsum/ssot-registry/issues"

[project.scripts]
ssot-mcp = "ssot_mcp.server:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
