[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-tui"
version = "0.1.2.dev1"
description = "Terminal UI package for ssot-registry workflows."
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
  "ssot-contracts>=0.2.5,<0.3.0",
  "ssot-registry>=0.2.5,<0.3.0",
  "textual>=8.2.3",
  "tomli>=2.0.1; python_version < '3.11'",
]
keywords = ["ssot", "tui", "textual", "registry"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry"
Repository = "https://github.com/groupsum/ssot-registry"
Issues = "https://github.com/groupsum/ssot-registry/issues"

[project.scripts]
ssot-tui = "ssot_tui.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
