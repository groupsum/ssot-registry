[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-registry"
version = "0.2.7"
description = "Umbrella distribution for SSOT that installs the core runtime and primary CLI together."
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "Apache-2.0"
authors = [
  { name = "Jacob Stewart", email = "jacob@swarmauri.com" }
]
dependencies = [
  "ssot-core==0.2.7",
  "ssot-cli>=0.1.3,<0.2.0",
  "ssot-contracts==0.2.7",
  "tomli>=2.0.1; python_version < '3.11'",
]
keywords = ["ssot", "bundle", "registry", "cli", "governance", "release-management", "developer-tools"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Intended Audience :: Information Technology",
  "Intended Audience :: Science/Research",
  "Natural Language :: English",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Database",
  "Topic :: File Formats :: JSON",
  "Topic :: File Formats :: JSON :: JSON Schema",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Documentation",
  "Topic :: Software Development :: Quality Assurance",
  "Topic :: Software Development :: Testing",
  "Topic :: Software Development :: Testing :: Acceptance",
  "Topic :: Software Development :: Testing :: Unit",
  "Topic :: System :: Archiving",
  "Topic :: System :: Archiving :: Packaging",
  "Topic :: Utilities",
]
[project.optional-dependencies]
tui = ["ssot-tui>=0.1.2,<0.2.0"]
all = ["ssot-tui>=0.1.2,<0.2.0"]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-registry"
Repository = "https://github.com/groupsum/ssot-registry/tree/main/pkgs/ssot-registry"
Issues = "https://github.com/groupsum/ssot-registry/issues"
