[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssot-registry"
version = "0.2.6.dev2"
description = "Portable single-source-of-truth registry for features, tests, claims, evidence, issues, risks, boundaries, releases, ADRs, and specs."
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "Apache-2.0"
authors = [
  { name = "Jacob Stewart", email = "jacob@swarmauri.com" }
]
dependencies = [
  "ssot-contracts==0.2.6.dev2",
  "ssot-views==0.2.6.dev2",
  "tomli>=2.0.1; python_version < '3.11'",
]
keywords = [
  "ssot",
  "registry",
  "claims",
  "evidence",
  "release-management",
  "certification",
  "governance"
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Intended Audience :: Information Technology",
  "Intended Audience :: Science/Research",
  "Natural Language :: English",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Database",
  "Topic :: File Formats :: JSON",
  "Topic :: File Formats :: JSON :: JSON Schema",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Topic :: Software Development :: Documentation",
  "Topic :: Software Development :: Libraries",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Software Development :: Quality Assurance",
  "Topic :: Software Development :: Testing",
  "Topic :: Software Development :: Testing :: Acceptance",
  "Topic :: Software Development :: Testing :: Unit",
  "Topic :: Software Development :: Version Control :: Git",
  "Topic :: System :: Archiving",
  "Topic :: System :: Archiving :: Packaging",
  "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/groupsum/ssot-registry"
Repository = "https://github.com/groupsum/ssot-registry"
Issues = "https://github.com/groupsum/ssot-registry/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"ssot_registry.schema" = ["*.json"]
"ssot_registry.templates" = ["*.json"]
